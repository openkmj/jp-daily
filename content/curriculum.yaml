# jp-daily 커리큘럼 (2026-05 ~ 2026-12)
# 기존: 2026-04 (4/24-4/30) — 인사/식당/길묻기/시간/쇼핑/마무리 mini-intro
# 사용자: 한국어 화자, 일본어 왕초보, 매일 3 sentences

global:
  level_arc: "5~7월 N5 core / 8~10월 N5 후반 / 11~12월 N5 마무리 + N4 살짝"
  tone: "정중체(~です/ます) 위주, 가끔 반말 표현 노출"
  daily_sentences: 3
  vocab_per_month_target: 80-95

months:
  2026-05:
    theme: "인사 강화 + 식당"
    weeks:
      - days: "5/1-5/7"
        topic: "일상 인사·안부"
        seed: ["おはようございます", "こんにちは", "こんばんは", "さようなら", "元気ですか", "久しぶり"]
      - days: "5/8-5/14"
        topic: "자기소개 확장 (직업·출신·나이)"
        seed: ["お仕事は", "学生", "会社員", "韓国から来ました", "何歳", "趣味"]
      - days: "5/15-5/21"
        topic: "식당 - 입장/메뉴/주문"
        seed: ["何名様", "予約", "メニュー", "おすすめ", "注文", "飲み物"]
      - days: "5/22-5/31"
        topic: "식당 - 추천/취향/계산"
        seed: ["辛い", "甘い", "好き", "嫌い", "別々", "お会計", "領収書"]
    grammar_focus:
      - "~がいいです (preference)"
      - "~たい / ~たいです (want to)"
      - "~から (because/from)"
      - "~ことがあります (experience)"
    new_vocab_target: 85

  2026-06:
    theme: "길·교통"
    weeks:
      - days: "6/1-6/7"
        topic: "길 묻기 - 방향·위치"
        seed: ["右", "左", "まっすぐ", "曲がる", "信号", "横断歩道"]
      - days: "6/8-6/14"
        topic: "거리·랜드마크"
        seed: ["近い", "遠い", "コンビニ", "本屋", "公園", "銀行"]
      - days: "6/15-6/21"
        topic: "전철·버스"
        seed: ["電車", "バス", "切符", "ホーム", "次の駅", "乗り換え"]
      - days: "6/22-6/30"
        topic: "택시·도착·환승"
        seed: ["タクシー", "空港", "着きます", "降ります", "間に合う"]
    grammar_focus:
      - "~まで (to/until)"
      - "~に乗ります / ~を降ります"
      - "どのくらい / どれくらい"
      - "~てください (please do)"
    new_vocab_target: 90

  2026-07:
    theme: "시간·약속"
    weeks:
      - days: "7/1-7/7"
        topic: "요일·날짜"
        seed: ["月曜日", "火曜日", "今日", "明日", "昨日", "来週", "先週"]
      - days: "7/8-7/14"
        topic: "시간 표현"
        seed: ["何時", "半", "ちょうど", "午前", "午後", "夜"]
      - days: "7/15-7/21"
        topic: "약속 잡기"
        seed: ["会いましょう", "どこで", "何時に", "予定", "暇", "忙しい"]
      - days: "7/22-7/31"
        topic: "변경·취소·지각"
        seed: ["遅れます", "キャンセル", "変更", "申し訳ない", "また今度"]
    grammar_focus:
      - "~時/~分/~時間"
      - "~に + 동사 (~에)"
      - "~から ~まで"
      - "~なければなりません (must)"
    new_vocab_target: 80

  2026-08:
    theme: "쇼핑·돈"
    weeks:
      - days: "8/1-8/7"
        topic: "가격 묻기"
        seed: ["いくら", "円", "高い", "安い", "ちょうど", "おつり"]
      - days: "8/8-8/14"
        topic: "사이즈·색상·디자인"
        seed: ["大きい", "小さい", "色", "黒", "白", "サイズ", "試着"]
      - days: "8/15-8/21"
        topic: "비교·취향"
        seed: ["~より", "~のほうが", "もっと", "違う色", "同じ"]
      - days: "8/22-8/31"
        topic: "결제·환불·영수증"
        seed: ["カード", "現金", "返品", "交換", "レシート", "ポイント"]
    grammar_focus:
      - "~より ~のほうが (comparison)"
      - "~てもいいですか (may I)"
      - "~ても (even if)"
      - "~でしょう (probably)"
    new_vocab_target: 90

  2026-09:
    theme: "날씨·계절"
    weeks:
      - days: "9/1-9/7"
        topic: "기본 날씨"
        seed: ["晴れ", "雨", "雪", "曇り", "風", "霧"]
      - days: "9/8-9/14"
        topic: "기온·체감"
        seed: ["暑い", "寒い", "涼しい", "暖かい", "蒸し暑い"]
      - days: "9/15-9/21"
        topic: "계절·연중 행사"
        seed: ["春", "夏", "秋", "冬", "桜", "紅葉", "祭り"]
      - days: "9/22-9/30"
        topic: "예보·대비"
        seed: ["天気予報", "傘", "持って行く", "降りそう"]
    grammar_focus:
      - "~そうです (looks like)"
      - "~なる (become)"
      - "~たり~たり"
      - "~でしょう (will probably)"
    new_vocab_target: 80

  2026-10:
    theme: "가족·관계"
    weeks:
      - days: "10/1-10/7"
        topic: "가족 호칭 (자기 가족)"
        seed: ["父", "母", "兄", "姉", "弟", "妹", "両親"]
      - days: "10/8-10/14"
        topic: "남의 가족·친구·동료"
        seed: ["お父さん", "お母さん", "友達", "同僚", "上司"]
      - days: "10/15-10/21"
        topic: "결혼·아이·반려동물"
        seed: ["結婚", "子供", "犬", "猫", "ペット"]
      - days: "10/22-10/31"
        topic: "성격·외모"
        seed: ["優しい", "面白い", "真面目", "背が高い", "髪が長い"]
    grammar_focus:
      - "~がいます / ~があります"
      - "~ている (state of being)"
      - "~について (about)"
      - "~ように (like, in order to)"
    new_vocab_target: 90

  2026-11:
    theme: "취미·일상"
    weeks:
      - days: "11/1-11/7"
        topic: "좋아하는 것·취미"
        seed: ["趣味", "好き", "嫌い", "得意", "苦手"]
      - days: "11/8-11/14"
        topic: "운동·스포츠"
        seed: ["運動", "サッカー", "野球", "走る", "泳ぐ", "ジム"]
      - days: "11/15-11/21"
        topic: "영화·음악·책"
        seed: ["映画", "音楽", "本", "読む", "聞く", "見る"]
      - days: "11/22-11/30"
        topic: "주말 계획·일과"
